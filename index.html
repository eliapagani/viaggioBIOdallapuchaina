<!DOCTYPE html>
<html>

<head>
    <style>
        .b-color-red {
            /* Definizione bordo: spessore, stile e colore */
            border: 1px solid red;

            /* Spazio tra il bordo e gli altri elementi esterni */
            margin: 10px;

            /* Spazio tra il testo interno e il bordo */
            padding: 5px;

            /* Colore dello sfondo (senza la parola 'solid') */
            background-color: bisque;

            /* Opzionale: rende il div largo quanto il contenuto */
            display: inline-block;

            /* Modifica i vertici del contenitore rendendoli piu appuntiti o piu tondi*/
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="b-color-red">Se sei felice che vengo a MonacoBio</div>
    <a href="ehiiii.jpg">cliccami!</a>

</body>

</html>
